{% extends 'base.html' %}
{% block title %}Sign In – SwiftBite{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <span class="auth-logo">🚀</span>
      <h1>Welcome back</h1>
      <p>Sign in to your SwiftBite account</p>
    </div>
    <form method="POST" class="auth-form">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@example.com" required class="form-input"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" required class="form-input"/>
      </div>
      <label class="remember-me">
        <input type="checkbox" name="remember"/> Remember me
      </label>
      <button type="submit" class="btn-primary btn-full">Sign In</button>
    </form>
    <p class="auth-switch">Don't have an account? <a href="{{ url_for('auth.register') }}">Sign up free →</a></p>

  </div>
</div>
{% endblock %}
