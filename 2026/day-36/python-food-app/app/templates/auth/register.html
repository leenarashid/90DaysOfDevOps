{% extends 'base.html' %}
{% block title %}Create Account – SwiftBite{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <span class="auth-logo">🚀</span>
      <h1>Create Account</h1>
      <p>Join SwiftBite and start ordering today</p>
    </div>
    <form method="POST" class="auth-form">
      <div class="form-row">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" name="name" placeholder="Your name" required class="form-input"/>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" name="phone" placeholder="555-0000" class="form-input"/>
        </div>
      </div>
      <div class="form-group">
        <label>Email Address *</label>
        <input type="email" name="email" placeholder="you@example.com" required class="form-input"/>
      </div>
      <div class="form-group">
        <label>Delivery Address</label>
        <input type="text" name="address" placeholder="123 Main St, City" class="form-input"/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Password *</label>
          <input type="password" name="password" placeholder="Minimum 6 characters" required class="form-input"/>
        </div>
        <div class="form-group">
          <label>Confirm Password *</label>
          <input type="password" name="confirm_password" placeholder="Repeat password" required class="form-input"/>
        </div>
      </div>
      <button type="submit" class="btn-primary btn-full">Create Account 🚀</button>
    </form>
    <p class="auth-switch">Already have an account? <a href="{{ url_for('auth.login') }}">Sign in →</a></p>
  </div>
</div>
{% endblock %}
