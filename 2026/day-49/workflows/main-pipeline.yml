  #         ignore-unfixed: true
        
  #         exit-code: 1

  # ─────────────────────────────────────────────
  # Job 4: Deploy to Production
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build
    environment: production

    steps:
      - name: Deploy image
        run: |
          echo "Deploying image: ${{ needs.docker-build.outputs.image_url }} to production"


