  #      with:
  #       username: #$take vars.DOCKER_USERNAME
  #       password: #$take secrets.DOCKER_TOKEN
  #    - name: Run Trivy vulnerability scan
  #      uses: aquasecurity/trivy-action@0.35.0
  #      with:
  #         image-ref: ${{ vars.DOCKER_USERNAME }}/github-actions-capstone:sha-${{ needs.generate-sha.outputs.short_sha }}
  #         format: table
