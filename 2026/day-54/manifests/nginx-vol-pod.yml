apiVersion: v1
kind: Pod
metadata:
  name: nginx-vol-pod
spec:
  containers:
    - name: nginx-vol-ctr
      image: nginx:1.26
      ports:
        - containerPort: 80
      volumeMounts:
        - name: nginx-conf-vol
          mountPath: /etc/nginx/conf.d

  volumes:
    - name: nginx-conf-vol
      configMap:
        name: nginx-config

