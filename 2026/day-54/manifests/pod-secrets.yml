apiVersion: v1
kind: Pod
metadata: 
  name: secret-pod
spec:
   containers:
     - name: secret-pod-ctr
       image: nginx:1.26
       ports:
         - containerPort: 80
       env:
       - name: DB_USER
         valueFrom:
           secretKeyRef:
              name: db-credentials
              key: DB_USER
       volumeMounts:
         -  name: db-volume
            mountPath: /etc/db-credentials
            readOnly: true
   volumes:
    - name: db-volume
      secret:
        secretName: db-credentials         #here secretName is necessary to mention not pnly name