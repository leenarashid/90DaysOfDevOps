apiVersion: v1
kind: Pod
metadata:
   name: startup-probe-pod2
spec:
  containers:
    - name: startup-probe-ctr
      image: busybox   
      command: 
        - sh
        - -c
        - "sleep 20 && touch /tmp/started"
      startupProbe:
         exec:
            command:
              - cat
              - /tmp/started
         periodSeconds: 5
         #failureThreshold: 12
         failureThreshold: 2
      livenessProbe:
         exec:
           command:
             - cat
             - /tmp/started
         periodSeconds: 5
         failureThreshold: 3
