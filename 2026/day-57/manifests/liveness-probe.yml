apiVersion: v1
kind: Pod
metadata:
   name: liveness-probe-pod
   
spec:
   containers:
      - name: busybox-ctr
        image: busybox
        command: [ "/bin/sh","-c","touch /tmp/healthy; sleep 30; rm -f /tmp/healthy; sleep 600"]
        livenessProbe:
         exec:
          command:
           - cat
           - /tmp/healthy
      #  initialDelaySeconds: 5
         periodSeconds: 5
         failureThreshold: 3