apiVersion: v1
kind: Pod
metadata:
  name: oom-test
spec:
  containers:
    - name: mem
      image: polinux/stress
      resources:
        limits:
          memory: "100Mi"
      command: ["stress"]
      args:
        - "--vm"
        - "2"
        - "--vm-bytes"
        - "300M"
        - "--vm-keep"
        - "--timeout"
        - "30s"