apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: web
spec:
  selector:
    matchLabels:
      app: web
  serviceName: headless-svc
  replicas: 3
  # minReadySeconds: 10 
  template:
    metadata:
      labels:
        app: web 
    spec:
       # terminationGracePeriodSeconds: 10
      containers:
      - name: web
        image: nginx
        ports:
        - containerPort: 80
          name: web
        volumeMounts:
        - name: www
          mountPath: /usr/share/nginx/html
  volumeClaimTemplates:
  - metadata:
      name: www
    spec:
      accessModes: [ "ReadWriteOnce" ]
      # storageClassName: "manual"
      resources:
        requests:
           storage: 100Mi