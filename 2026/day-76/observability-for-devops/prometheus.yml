global:
  scrape_interval: 15s     
  #evaluation_interval: 15s
rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
    - job_name: "prometheus"
      scrape_interval: 1m
      static_configs:
        - targets: ["prometheus:9090"]

    - job_name: "cadvisor"
      scrape_interval: 1m
      static_configs:
        - targets: ["cadvisor:8080"]  
    - job_name: "node-exporter"
      scrape_interval: 1m
      static_configs:
        - targets: ["node-exporter:9100"] 
    - job_name: "grafana"
      scrape_interval: 1m
      static_configs:
        - targets: ["grafana:3000"] 
    - job_name: "loki"
      scrape_interval: 1m
      static_configs:
        - targets: ["loki:3100"]    
    - job_name: "promtail"
      scrape_interval: 1m
      static_configs:
        - targets: ["promtail:9080"]

    - job_name: "otel-collector"
      scrape_interval: 1m
      static_configs:
        - targets: ["otel-collector:8889"]    
