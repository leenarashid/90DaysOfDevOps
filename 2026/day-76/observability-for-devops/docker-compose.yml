services:
   notes-app:
      build:
         context: "./notes-app"
         dockerfile: "Dockerfile"
      container_name: "notes-app"
      ports:
        - "8000:8000"
      networks:
        - monitoring
      restart: unless-stopped  
   prometheus:
      image: prom/prometheus:latest
      container_name: prometheus
      ports:
        - "9090:9090"
      volumes:
        - ./prometheus.yml:/etc/prometheus/prometheus.yml
        - prometheus_data:/prometheus
        - ./alert-rules.yml:/etc/prometheus/alert-rules.yml
      
      command:
        - '--config.file=/etc/prometheus/prometheus.yml'
        - '--storage.tsdb.path=/prometheus'
      restart: unless-stopped
      networks:
        - monitoring


   cadvisor:
      image: gcr.io/cadvisor/cadvisor:latest  # Pin a "latest" stable version
      container_name: cadvisor
      ports:
        - "8080:8080"
      volumes:
        - /:/rootfs:ro
        - /var/run:/var/run:ro
        - /sys:/sys:ro
        - /var/lib/docker/:/var/lib/docker:ro
        - /dev/disk/:/dev/disk:ro
      networks:
        - monitoring
      restart: unless-stopped

   node-exporter:
     image: prom/node-exporter:latest
     container_name: node-exporter
     restart: unless-stopped
     volumes:
       - /proc:/host/proc:ro
       - /sys:/host/sys:ro
       - /:/rootfs:ro
     command:
       - '--path.procfs=/host/proc'
       - '--path.rootfs=/rootfs'
       - '--path.sysfs=/host/sys'
       - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
       - '--collector.netclass.ignored-devices=^(veth.*)$$'
     ports:
      - "9100:9100"
     networks:
      - monitoring


   grafana:
     image: grafana/grafana-enterprise
     container_name: grafana
     restart: unless-stopped
     environment:
      # increases the log level from info to debug
       - GF_SECURITY_ADMIN_USER=admin
       - GF_SECURITY_ADMIN_PASSWORD=admin123
     ports:
      - '3000:3000'
     volumes:
      - 'grafana_storage:/var/lib/grafana'
     networks:
       - monitoring

   loki:
     image: grafana/loki:latest
     container_name: loki
     ports:
        - "3100:3100"
     volumes:
       - ./loki/loki-config.yml:/etc/loki/loki-config.yml
       - loki_data:/loki
     command: -config.file=/etc/loki/loki-config.yml
     networks:
       - monitoring
   promtail:
     image: grafana/promtail:latest
     container_name: promtail
     depends_on:
      - loki
    
     volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yaml
      - ./positions.yaml:/var/lib/promtail/positions.yaml
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock #should include this volume to get the logs of docker 
   
     command: -config.file=/etc/promtail/promtail-config.yaml
     ports:
      - "9080:9080"
     networks:
      - monitoring


   otel-collector:
     image: otel/opentelemetry-collector-contrib:latest
     container_name: otel-collector
     ports:
       - "4317:4317"   # OTLP gRPC
       - "4318:4318"   # OTLP HTTP
       - "8889:8889"   # Prometheus exporter
     volumes:
       - ./otel-collector/otel-collector-config.yml:/etc/otelcol-contrib/config.yaml
     restart: unless-stopped
     networks:
       - monitoring    
     
     
volumes:
    prometheus_data: {}
    grafana_storage: {}
    loki_data: {}
networks: 
    monitoring:




